services:
  sqlite:
    image: nouchka/sqlite3:latest
    container_name: sqlite_db
    volumes:
      - ./data/sqlite_data:/root/db
    environment:
      - SQLITE_DATABASE=experiments.db
    restart: unless-stopped

  license-plate-api:
    build: .
    container_name: license-plate-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./service:/app/service
      - ./src:/app/src
      - ./logs:/app/logs
      - ./data/sqlite_data:/app/data/sqlite_data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - sqlite

  license-plate-web:
    build: .
    container_name: license-plate-web
    ports:
      - "8501:8501"
    volumes:
      - ./service:/app/service
      - ./src:/app/src
    environment:
      - API_URL=http://license-plate-api:8000
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: ["streamlit", "run", "service/web_app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    restart: unless-stopped
    depends_on:
      - license-plate-api