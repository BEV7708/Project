version: '3.8'

services:
  jupyter:
    image: quay.io/jupyter/datascience-notebook:82d322f00937
    container_name: ml_notebook
    ports:
      - "8888:8888"
    volumes:
      # Основные директории проекта (соответствуют структуре)
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
      - ./configs:/home/jovyan/work/configs
      - ./data:/home/jovyan/work/data
      - ./models:/home/jovyan/work/models
      - ./outputs:/home/jovyan/work/outputs
      - ./service:/home/jovyan/work/service
      - ./tests:/home/jovyan/work/tests
      
      # Конфигурационные файлы в корне
      - ./requirements.txt:/home/jovyan/work/requirements.txt
      - ./README.md:/home/jovyan/work/README.md
      - ./.gitignore:/home/jovyan/work/.gitignore
      - ./Dockerfile:/home/jovyan/work/Dockerfile
      
      # Дополнительные тома для удобства
      - ./downloads:/home/jovyan/downloads
      - jupyter_data:/home/jovyan/.local
      
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - NB_UID=1000
      - NB_GID=100
      # Пути для проекта
      - PYTHONPATH=/home/jovyan/work/src
      - DATA_PATH=/home/jovyan/work/data
      - MODELS_PATH=/home/jovyan/work/models
      - OUTPUTS_PATH=/home/jovyan/work/outputs
      - CONFIGS_PATH=/home/jovyan/work/configs
      
    command: >
      start-notebook.sh 
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --NotebookApp.token='' 
      --NotebookApp.password=''
      
    working_dir: /home/jovyan/work
    restart: unless-stopped
    user: root
    
    # Лимиты ресурсов
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # SQLite для хранения данных экспериментов
  sqlite:
    image: nouchka/sqlite3:latest
    container_name: sqlite_db
    volumes:
      - ./data/sqlite_data:/root/db
      - ./outputs/experiments:/root/experiments  # Для доступа к экспериментам
    environment:
      - SQLITE_DATABASE=experiments.db
    ports:
      - "8000:8000"
    command: >
      sh -c "
        mkdir -p /root/db &&
        sqlite3 /root/db/experiments.db
      "
    restart: unless-stopped
    user: root
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  license-plate-api:
    build: .
    container_name: license-plate-detector
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  

volumes:
  jupyter_data:
  models_data:
  sqlite_data: